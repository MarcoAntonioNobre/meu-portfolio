<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
    <title>Calculadoras</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1391727502348511"
     crossorigin="anonymous"></script>
</head>
<body class="bg-black">
<div class="container mt-3">
    <div class="text-center mt-4">
        <a href="index.html" class="text-decoration-none text-white">
            <button class="btn btn-secondary btn-sm w-50">
                Voltar para página principal
            </button>
        </a>
    </div>
    <div class="row">
        <div class="col-md-6 mt-5">
            <h3>
                Calcula se a soma de A+B é maior que C
            </h3>
            <p>Apenas valores inteiros!</p>
            <div class="mt-2">
                <label for="valor1" class="label-control">Valor de A:</label>
                <input type="number" name="valor1" id="valor1" class="form-control" value="0">
            </div>
            <div class="mt-2">
                <label for="valor2" class="label-control">Valor de B:</label>
                <input type="number" name="valor2" id="valor2" class="form-control" value="0">
            </div>
            <div class="mt-2">
                <label for="valor3" class="label-control">Valor de C:</label>
                <input type="number" name="valor3" id="valor3" class="form-control" value="0">
            </div>
            <button class="btn btn-sm btn-success mb-3 mt-4" onclick="calcular()">
                Calcular
            </button>
            <div>
                <p><b>Resultado:</b> <span id="resultadoABC"></span></p>
            </div>
        </div>
        <div class="col-md-6 mt-5">
            <h3>
                Verifica se o número é par ou ímpar e se é positivo ou negativo
            </h3>
            <div>
                <label for="parOuImpar" class="label-control">Digite um número:</label>
                <input type="text" name="parOuImpar" id="parOuImpar" class="form-control" value="0">
                <div class="">
                    <button onclick="parOuImparPositivoNegativo()" class="btn btn-sm btn-success mt-2 mb-3">
                        Calcular
                    </button>
                </div>
            </div>
            <p>
                <b>Resultado:</b> <span id="resultadoImparPar"></span>
            </p>
        </div>
    </div>
    <hr>
    <div>
        <div class="row">
            <div class="col-md-6 py-3 mt-5">
                <h3>
                    Calcular IMC (Índice de Massa Corporal)
                </h3>
                <div class="mt-2">
                    <label for="peso" class="label-control">Digite o seu peso em KG:</label>
                    <input type="number" name="peso" id="peso" class="form-control" value="60">
                </div>
                <div class="mt-2">
                    <label for="altura" class="label-control">Digite sua altura em CM:</label>
                    <input type="number" name="altura" id="altura" class="form-control" value="170">
                </div>
                <button class="btn btn-sm mt-2 mb-3 btn-success" onclick="calcularIMC()">
                    Calcular
                </button>
                <div>
                    <p><b>Resultado:</b> <span id="resultadoIMC"></span></p>
                </div>
                <div class="mb-4 alert" style="display: none;" id="quadroIMC">
                    <h4>Observação:</h4>
                    <span id="obs"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
<script src="./js/script.js"></script>
</body>
</html>
